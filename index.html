<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好好民宿 | 線上訂房與空房查詢</title>
    <meta name="description" content="好好民宿 — 提供舒適住宿體驗，線上即時查詢空房與報價，輕鬆完成訂房。">
    <meta name="theme-color" content="#faf9f7">
    <link rel="icon" href="https://imgur.com/925OqUB.png" type="image/png">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="好好民宿 | 線上訂房與空房查詢">
    <meta property="og:description" content="好好民宿 — 提供舒適住宿體驗，線上即時查詢空房與報價，輕鬆完成訂房。">
    <meta property="og:image" content="https://imgur.com/925OqUB.png">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://calendar.google.com">
    <link rel="dns-prefetch" href="https://bylmdada.github.io">
    <link rel="dns-prefetch" href="https://i.imgur.com">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "LodgingBusiness",
        "name": "好好民宿",
        "description": "好好民宿 — 提供舒適住宿體驗，線上即時查詢空房與報價。",
        "image": "https://imgur.com/925OqUB.png"
    }
    </script>

    <style>
        :root {
            --bg-primary: #faf9f7;
            --bg-secondary: #f5f3f0;
            --text-primary: #4a4a4a;
            --text-secondary: #6b6b6b;
            --accent-color: #8b9a8e;
            --shadow-light: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.12);
            --border-radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', 'Zen Kaku Gothic New', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem 1rem;
            scroll-behavior: smooth;
        }

        /* Skip to content link for accessibility */
        .skip-link {
            position: absolute;
            top: -100%;
            left: 0;
            padding: 0.5rem 1rem;
            background: var(--accent-color);
            color: #fff;
            z-index: 100;
            font-size: 0.9rem;
            text-decoration: none;
            border-radius: 0 0 var(--border-radius) 0;
        }

        .skip-link:focus {
            top: 0;
        }

        /* Keyboard navigation focus styles */
        .keyboard-navigation *:focus {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .header {
            text-align: center;
            padding: 2rem 0;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 10%;
            margin: 0 auto 2rem;
            display: block;
            object-fit: cover;
            box-shadow: var(--shadow-light);
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo-fallback {
            width: 120px;
            height: 120px;
            border-radius: 10%;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-secondary);
            box-shadow: var(--shadow-light);
            font-size: 2.5rem;
            color: var(--accent-color);
        }

        .title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 300;
            color: var(--text-primary);
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: start;
        }

        .section {
            background-color: var(--bg-secondary);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-light);
            transition: box-shadow 0.3s ease, transform 0.2s ease;
        }

        .section:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            text-align: center;
            letter-spacing: 0.05em;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            height: 600px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
        }

        .iframe-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            background-color: var(--bg-secondary);
            transition: opacity 0.3s ease;
        }

        .iframe-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                padding: 1rem 0.5rem;
            }

            .container {
                gap: 2rem;
            }

            .header {
                padding: 1rem 0;
            }

            .logo,
            .logo-fallback {
                width: 100px;
                height: 100px;
                margin-bottom: 1.5rem;
            }

            .logo-fallback {
                font-size: 2rem;
            }

            .title {
                font-size: 2.2rem;
                margin-bottom: 0.5rem;
            }

            .content {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .section {
                padding: 1rem;
            }

            .iframe-container {
                height: 500px;
            }

        }

        @media (max-width: 480px) {
            .iframe-container {
                height: 450px;
            }

            .section {
                padding: 0.8rem;
            }

            .section-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">跳至主要內容</a>

    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <img src="https://imgur.com/925OqUB.png" alt="好好民宿 Logo" class="logo" width="120" height="120">
            <h1 class="title">好好民宿</h1>
        </header>

        <!-- Main Content -->
        <main id="main-content" class="content">
            <!-- Google Calendar Section -->
            <section class="section">
                <h2 class="section-title">房間空房查詢</h2>
                <div class="iframe-container">
                    <div class="iframe-loading" aria-hidden="true">載入中...</div>
                    <iframe
                        src="https://calendar.google.com/calendar/u/0/embed?src=YnlsbWRhZGFAZ21haWwuY29t&ctz=Asia/Taipei"
                        title="房間空房日曆"
                        aria-label="Google 日曆 — 查看房間空房狀態"
                        loading="lazy"
                        width="600"
                        height="600"
                        referrerpolicy="no-referrer-when-downgrade"
                        sandbox="allow-scripts allow-same-origin allow-popups">
                    </iframe>
                </div>
            </section>

            <!-- Booking System Section -->
            <section class="section">
                <h2 class="section-title">線上報價系統</h2>
                <div class="iframe-container">
                    <div class="iframe-loading" aria-hidden="true">載入中...</div>
                    <iframe
                        src="https://bylmdada.github.io/haohao/"
                        title="線上報價系統"
                        aria-label="好好民宿線上報價系統"
                        loading="lazy"
                        width="600"
                        height="600"
                        referrerpolicy="no-referrer-when-downgrade"
                        sandbox="allow-scripts allow-same-origin allow-popups allow-forms">
                    </iframe>
                </div>
            </section>
        </main>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Logo fallback on error
            var logo = document.querySelector(".logo");
            logo.addEventListener("error", function() {
                var fallback = document.createElement("div");
                fallback.className = "logo-fallback";
                fallback.setAttribute("aria-hidden", "true");
                fallback.textContent = "\u597D";
                logo.replaceWith(fallback);
            });

            // Hide loading overlay when iframe loads
            var iframes = document.querySelectorAll("iframe");
            iframes.forEach(function(iframe) {
                iframe.addEventListener("load", function() {
                    var loading = this.parentElement.querySelector(".iframe-loading");
                    if (loading) loading.classList.add("hidden");
                });

                iframe.addEventListener("error", function() {
                    var loading = this.parentElement.querySelector(".iframe-loading");
                    if (loading) loading.textContent = "\u8f09\u5165\u5931\u6557\uff0c\u8acb\u91cd\u65b0\u6574\u7406\u9801\u9762";
                });
            });

            // Keyboard navigation focus styles
            document.addEventListener("keydown", function(e) {
                if (e.key === "Tab") {
                    document.body.classList.add("keyboard-navigation");
                }
            });

            document.addEventListener("mousedown", function() {
                document.body.classList.remove("keyboard-navigation");
            });
        });
    </script>
</body>
</html>
